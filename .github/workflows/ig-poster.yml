name: IG Auto-Poster

# Postet 2x/Tag je 1 faelliges Reel pro Konto (=2/Tag/Konto) organisch ueber die
# Instagram Graph API. Laeuft auf GitHubs Servern (public Repo = kostenlos), also
# unabhaengig vom Laptop. Zeiten in UTC: 10:00 = 12:00 Berlin (CEST), 16:00 = 18:00.
on:
  schedule:
    - cron: '0 10 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ig-poster
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Post next reels
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
        run: python3 automation/ig_publisher.py --run --n 1
      - name: Persist state
        # always(): ein Teilerfolg (Konto A gepostet, Konto B gescheitert) muss
        # trotzdem committet werden, sonst wird A beim naechsten Lauf doppelt gepostet.
        if: always()
        run: |
          git config user.name "ig-poster-bot"
          git config user.email "ig-poster-bot@users.noreply.github.com"
          git add automation/state-ig.json
          git commit -m "state: advance IG posting [skip ci]" || echo "no state change"
          git push
